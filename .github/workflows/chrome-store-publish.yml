name: Chrome Store Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: chrome-store-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-to-chrome-store:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Ensure tag commit is on main
      run: |
        git fetch origin main --depth=1
        if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
          echo "Tag ${GITHUB_REF_NAME} is not on main branch commit history."
          exit 1
        fi

    - name: Build extension package
      run: ./.github/scripts/build-extension.sh dist "nenya-${GITHUB_REF_NAME}.zip"

    - name: Publish to Chrome Web Store
      env:
        CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
        CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
        CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
        CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        CWS_PUBLISH_TARGET: ${{ secrets.CWS_PUBLISH_TARGET }}
      run: ./.github/scripts/publish-to-cws.sh "dist/nenya-${GITHUB_REF_NAME}.zip"
