<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="utf-8">
  <title>Nenya - Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <link rel="stylesheet" href="../libs/daisyui@5.css">
  <link rel="stylesheet" href="../libs/daisyui@5-themes.css">
  <link rel="stylesheet" href="../shared/extension-utilities.css">
  <link rel="stylesheet" href="../shared/cozy-theme.css">
  <link rel="stylesheet" href="./home.css">
  <script src="../libs/prompt.js"></script>
</head>

<body data-surface="home" class="bg-base-200">
  <div class="home-shell">
    <header class="home-header">
      <div class="home-brand">
        <img id="extensionIcon" src="../../assets/icons/icon-48x48.png" alt="Nenya" class="home-brand-icon" />
        <span>Nenya</span>
      </div>
      <div id="shortcutsContainer" class="home-shortcuts" aria-label="Action shortcuts"></div>
    </header>

    <div class="home-content">
      <div class="home-status-row">
        <span id="autoReloadStatus" class="text-xs text-base-content/70" hidden></span>
      </div>

      <main class="home-main">
        <article class="home-card home-search-card bg-base-100 nenya-soft-surface" aria-labelledby="bookmarks-search-heading">
          <h1 id="bookmarks-search-heading" class="sr-only">Bookmarks Search</h1>
          <div class="space-y-3">
            <div class="relative">
              <input id="bookmarksSearchInput" type="search" placeholder="Search bookmarks..."
                class="input input-bordered w-full nenya-soft-input" autofocus />
              <div
                id="customSearchSuggestions"
                class="hidden absolute left-0 right-0 top-full mt-1 z-20 bg-base-100/95 border border-base-300 rounded-md shadow-md max-h-56 overflow-y-auto"
                role="listbox"
                aria-label="Custom search engines">
              </div>
            </div>
            <div id="pinnedItemsContainer" class="flex flex-wrap gap-2 mt-2 empty:mt-0"></div>
            <div id="bookmarksSearchResults" class="space-y-2" role="list"></div>
          </div>
        </article>
      </main>
    </div>
  </div>

  <div id="statusMessage"
    class="fixed bottom-6 left-1/2 -translate-x-1/2 z-30 text-center px-4 py-2 text-sm text-base-content/85 bg-base-100/90 border border-base-300 rounded-lg min-h-5 opacity-0 transition-opacity duration-300"
    role="status" aria-live="polite">
  </div>

  <input id="importCustomCodeFileInput" type="file" accept="application/json" class="hidden" />

  <script src="../popup/popup.js" type="module"></script>

  <dialog id="saveToUnsortedModal" class="modal">
    <div class="modal-box">
      <h3 class="font-bold text-lg">Save to Unsorted</h3>
      <div class="py-4 space-y-4">
        <div>
          <label class="label">
            <span class="label-text">Title</span>
          </label>
          <input id="saveToUnsortedTitleInput" type="text" placeholder="Enter title"
            class="input input-bordered w-full" autofocus />
        </div>
        <div>
          <label class="label">
            <span class="label-text">Description</span>
          </label>
          <textarea id="saveToUnsortedDescriptionInput" class="textarea textarea-bordered w-full"
            placeholder="Enter description (optional)"></textarea>
        </div>
        <div class="form-control">
          <label class="label cursor-pointer">
            <span class="label-text">Include Screenshot</span>
            <input id="saveToUnsortedScreenshotCheckbox" type="checkbox" class="checkbox" />
          </label>
        </div>
      </div>
      <div class="modal-action">
        <button id="saveToUnsortedCancelButton" class="btn">Cancel</button>
        <button id="saveToUnsortedConfirmButton" class="btn btn-primary">Save</button>
      </div>
    </div>
  </dialog>
</body>

</html>
